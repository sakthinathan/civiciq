name: CivicIQ CI — Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate app starts correctly
        env:
          GEMINI_API_KEY: test_key_placeholder
          RATELIMIT_STORAGE_URI: memory://
          TESTING: "true"
          FLASK_ENV: testing
        run: |
          python -c "from app import create_app; app = create_app(); print('App created successfully')"

      - name: Run full test suite
        env:
          GEMINI_API_KEY: test_key_placeholder
          RATELIMIT_STORAGE_URI: memory://
          TESTING: "true"
          FLASK_ENV: testing
        run: |
          python3 -m pytest tests/ -v --tb=short --ignore=tests/test_services.py

      - name: Check code style
        run: |
          pip install pyflakes
          python3 -m pyflakes routes/ services/ config.py app.py || true
